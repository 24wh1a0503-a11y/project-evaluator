<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Evaluator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🚀 Project Evaluator</h1>

    <form action="https://project-evaluator-6pfh.onrender.com/evaluate" method="GET">
        <input 
            type="text" 
            name="repo_url"
            placeholder="Paste GitHub repo URL"
            required
        >
        <br>
        <button type="submit">Evaluate</button>
    </form>
</div>

</body>
</html>
